<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình Tạo Slogan & Tên Thương Hiệu</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Tạo Slogan & Tên Thương Hiệu</h1>
            <p class="subtitle">Tạo slogan và tên thương hiệu độc đáo bằng AI</p>
        </header>

        <main class="main-content">
            <section class="input-section">
                <h2>Tạo Thương Hiệu Của Bạn</h2>
                
                <div class="form-group">
                    <label for="companyName">Tên Công Ty <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="companyName" 
                        placeholder="Ví dụ: TechVision, EcoWear, v.v."
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="industry">Lĩnh Vực / Ngành <span class="required">*</span></label>
                    <select id="industry" required>
                        <option value="">-- Chọn Lĩnh Vực --</option>
                        <option value="Công nghệ">Technology</option>
                        <option value="Thời trang">Fashion</option>
                        <option value="Ăn uống">Food & Beverage</option>
                        <option value="Sức khỏe">Healthcare</option>
                        <option value="Tài chính">Finance</option>
                        <option value="Giáo dục">Education</option>
                        <option value="Giải trí">Entertainment</option>
                        <option value="E-commerce">E-commerce</option>
                        <option value="Bất động sản">Real Estate</option>
                        <option value="Thể dục">Fitness</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="style">Phong Cách Thương Hiệu <span class="required">*</span></label>
                    <select id="style" required>
                        <option value="">-- Chọn Phong Cách --</option>
                        <option value="Hiện đại">Modern</option>
                        <option value="Cổ điển">Classic</option>
                        <option value="Sáng tạo">Creative</option>
                        <option value="Tối giản">Minimalist</option>
                        <option value="Vui nhộn">Playful</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="language">Ngôn Ngữ <span class="required">*</span></label>
                    <select id="language" required>
                        <option value="">-- Chọn Ngôn Ngữ --</option>
                        <option value="English">English</option>
                        <option value="Vietnamese">Tiếng Việt</option>
                    </select>
                </div>

                <button id="generateBtn" class="btn-generate">Tạo Thương Hiệu</button>
                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Đang tạo thương hiệu của bạn...</p>
                </div>
                <div id="errorMessage" class="error-message" style="display: none;"></div>
            </section>

            <section id="resultsSection" class="results-section" style="display: none;">
                <h2>Thương Hiệu Của Bạn</h2>
                
                <div class="brand-results">
                    <div class="description-section">
                        <h3>Mô Tả Công Ty</h3>
                        <div id="descriptionResult" class="description-display"></div>
                    </div>

                    <div class="slogan-section">
                        <h3>Slogan</h3>
                        <div id="sloganResult" class="slogan-display"></div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="regenerateBtn" class="btn-secondary">Tạo Lại</button>
                    <button id="resetBtn" class="btn-secondary">Bắt Đầu Lại</button>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>Được cấp bởi Google Gemini AI | Được tạo cho các doanh nhân và khởi nghiệp</p>
        </footer>
    </div>

    <!-- Copy notification -->
    <div id="copyNotification" class="copy-notification" style="display: none;">
        ✓ Đã sao chép vào clipboard!
    </div>

    <script src="app.js"></script>
</body>
</html>
