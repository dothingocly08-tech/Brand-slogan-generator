<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Slogan & Name Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Brand Slogan & Name Generator</h1>
            <p class="subtitle">Create unique slogans and brand names powered by AI</p>
        </header>

        <main class="main-content">
            <section class="input-section">
                <h2>Create Your Brand Identity</h2>
                
                <div class="form-group">
                    <label for="companyName">Company Name <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="companyName" 
                        placeholder="e.g., TechVision, EcoWear, etc."
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="industry">Industry / Field <span class="required">*</span></label>
                    <select id="industry" required>
                        <option value="">-- Select Industry --</option>
                        <option value="Technology">Technology</option>
                        <option value="Fashion">Fashion</option>
                        <option value="Food & Beverage">Food & Beverage</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Finance">Finance</option>
                        <option value="Education">Education</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="E-commerce">E-commerce</option>
                        <option value="Real Estate">Real Estate</option>
                        <option value="Fitness">Fitness</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="style">Brand Style <span class="required">*</span></label>
                    <select id="style" required>
                        <option value="">-- Select Style --</option>
                        <option value="Modern">Modern</option>
                        <option value="Classic">Classic</option>
                        <option value="Creative">Creative</option>
                        <option value="Minimalist">Minimalist</option>
                        <option value="Playful">Playful</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="language">Language <span class="required">*</span></label>
                    <select id="language" required>
                        <option value="">-- Select Language --</option>
                        <option value="English">English</option>
                        <option value="Vietnamese">Tiếng Việt</option>
                    </select>
                </div>

                <button id="generateBtn" class="btn-generate">Generate Brand</button>
                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Creating your brand identity...</p>
                </div>
                <div id="errorMessage" class="error-message" style="display: none;"></div>
            </section>

            <section id="resultsSection" class="results-section" style="display: none;">
                <h2>Your Brand Identity</h2>
                
                <div class="brand-results">
                    <div class="description-section">
                        <h3>Company Description</h3>
                        <div id="descriptionResult" class="description-display"></div>
                    </div>

                    <div class="slogan-section">
                        <h3>Brand Slogan</h3>
                        <div id="sloganResult" class="slogan-display"></div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="regenerateBtn" class="btn-secondary">Regenerate</button>
                    <button id="resetBtn" class="btn-secondary">Start Over</button>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>Powered by Google Gemini AI | Made for entrepreneurs and startups</p>
        </footer>
    </div>

    <!-- Copy notification -->
    <div id="copyNotification" class="copy-notification" style="display: none;">
        ✓ Copied to clipboard!
    </div>

    <script src="app.js"></script>
</body>
</html>
